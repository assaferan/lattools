name: Tests (Magma)

# Magma is proprietary, so the binary is downloaded from a private URL held in
# the MAGMA_URL secret. Forks without the secret skip the test job cleanly, and
# only users with write access trigger it (pull_request_target exposes secrets,
# so the permission gate is required). This mirrors edgarcosta/hilbertmodularforms.

on:
  push:
    branches: ['**']
  pull_request_target:

jobs:
  has_access:
    runs-on: ubuntu-latest
    outputs:
      has_access: ${{ steps.my-key.outputs.has_access }}
    steps:
      - id: my-key
        env:
          MAGMA_URL: ${{ secrets.MAGMA_URL }}
        if: "${{ env.MAGMA_URL != '' }}"
        run: echo "has_access=true" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    name: Run Magma tests
    needs: has_access
    if: needs.has_access.outputs.has_access == 'true'

    steps:
      - name: Check user permission
        id: check
        uses: scherermichael-oss/action-has-permission@master
        with:
          required-permission: write
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop workflow for users with no write access
        if: "! steps.check.outputs.has-permission"
        run: |
          echo "Sorry! Your permissions are insufficient."
          false

      - name: Checkout for a push event
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'push' }}

      - name: Checkout for a PR event
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request_target' }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Cache magma
        uses: actions/cache@v4
        id: magmacache
        env:
          # Increase this value to reset the cache when MAGMA_URL changes.
          CACHE_NUMBER: magma-1
        with:
          path: ./magma
          key: ${{ env.CACHE_NUMBER }}

      - name: Install magma
        env:
          MAGMA_URL: ${{ secrets.MAGMA_URL }}
        shell: bash
        if: steps.magmacache.outputs.cache-hit != 'true'
        run: |
          wget "$MAGMA_URL" -O magma.tar.gz --quiet
          tar xf magma.tar.gz

      - name: Create dummy network device
        shell: bash
        run: |
          sudo ip link add dumdum type dummy
          sudo ifconfig dumdum hw ether `./magma/magma -d | grep "Valid MAC addresses" -A1 | tail -n1`
          echo | ./magma/magma

      - name: Run Magma tests
        shell: bash
        run: |
          # Magma batch mode always exits 0 (even on assertion failures or
          # runtime errors), and an uncaught error can hang waiting on stdin, so
          # close stdin and gate on the PASS sentinel the test prints only when
          # all hashes match.
          ./magma/magma -b tests/test_bv.m </dev/null | tee magma.out
          grep -q '^PASS:' magma.out
